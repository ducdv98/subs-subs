<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dual Subtitles</title>
    <style>
      :root {
        --bg: #14161a;
        --surface: #1c1f24;
        --surface-border: #2a2e35;
        --text: #f2f0ea;
        --text-muted: #8b8f98;
        --accent: #ffb020;
        --accent-soft: rgba(255, 176, 32, 0.16);
        --radius: 10px;
        --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        --font-mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, monospace;
      }

      * {
        box-sizing: border-box;
      }

      body {
        width: 268px;
        margin: 0;
        padding: 14px;
        background: var(--bg);
        color: var(--text);
        font: 13px/1.4 var(--font-sans);
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }

      .mark {
        display: flex;
        flex-direction: column;
        gap: 3px;
        width: 18px;
      }

      .mark span {
        display: block;
        height: 3px;
        border-radius: 2px;
        background: var(--accent);
      }

      .mark span:last-child {
        width: 65%;
        background: var(--text-muted);
      }

      .wordmark {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text-muted);
      }

      .panel {
        background: var(--surface);
        border: 1px solid var(--surface-border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .row {
        padding: 12px;
      }

      .row + .row {
        border-top: 1px solid var(--surface-border);
      }

      .eyebrow {
        display: block;
        font-size: 10.5px;
        font-weight: 600;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 2px;
      }

      .toggle-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .toggle-copy p {
        margin: 2px 0 0;
        font-size: 11px;
        color: var(--text-muted);
      }

      .switch-wrap {
        position: relative;
        flex-shrink: 0;
        width: 42px;
        height: 24px;
        cursor: pointer;
      }

      .switch-wrap input {
        position: absolute;
        inset: 0;
        opacity: 0;
        margin: 0;
        cursor: pointer;
      }

      .switch {
        position: absolute;
        inset: 0;
        background: #2a2e35;
        border: 1px solid var(--surface-border);
        border-radius: 999px;
        transition: background 0.18s ease, border-color 0.18s ease;
      }

      .switch-thumb {
        position: absolute;
        top: 2px;
        left: 2px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: var(--text-muted);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2px;
        transition: transform 0.18s ease, background 0.18s ease;
      }

      .switch-thumb span {
        display: block;
        width: 8px;
        height: 1.5px;
        border-radius: 1px;
        background: var(--bg);
      }

      .switch-thumb span:last-child {
        width: 5px;
      }

      input:checked ~ .switch {
        background: var(--accent-soft);
        border-color: var(--accent);
      }

      input:checked ~ .switch .switch-thumb {
        transform: translateX(18px);
        background: var(--accent);
      }

      input:focus-visible ~ .switch {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .lang-head {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 6px;
      }

      .lang-code {
        font-family: var(--font-mono);
        font-size: 10.5px;
        letter-spacing: 0.02em;
        color: var(--accent);
        background: var(--accent-soft);
        border-radius: 4px;
        padding: 1px 5px;
      }

      select {
        width: 100%;
        appearance: none;
        background: var(--bg) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="6" viewBox="0 0 10 6"><path d="M1 1l4 4 4-4" stroke="%238b8f98" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>')
          no-repeat right 10px center;
        color: var(--text);
        border: 1px solid var(--surface-border);
        border-radius: 6px;
        padding: 7px 26px 7px 9px;
        font: inherit;
        cursor: pointer;
      }

      select:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 1px;
      }

      @media (prefers-reduced-motion: reduce) {
        .switch,
        .switch-thumb {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="mark"><span></span><span></span></div>
      <span class="wordmark">Dual Subtitles</span>
    </div>

    <div class="panel">
      <div class="row toggle-row">
        <div class="toggle-copy">
          <span class="eyebrow">Dual-Sub Mode</span>
          <p>Stack a translated line under captions</p>
        </div>
        <label class="switch-wrap">
          <input type="checkbox" id="dualSubMode" />
          <span class="switch">
            <span class="switch-thumb"><span></span><span></span></span>
          </span>
        </label>
      </div>

      <div class="row">
        <div class="lang-head">
          <span class="eyebrow">Secondary Language</span>
          <span class="lang-code" id="secondaryLanguageCode"></span>
        </div>
        <select id="secondaryLanguage"></select>
      </div>
    </div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
